# scripts/gen_inventory.sh 실행 후 자동 생성됩니다
# terraform apply 완료 후: bash scripts/gen_inventory.sh

[master]
k8s-master ansible_host=MASTER_PUBLIC_IP

[workers]
k8s-worker-0 ansible_host=WORKER0_PUBLIC_IP
k8s-worker-1 ansible_host=WORKER1_PUBLIC_IP
k8s-worker-2 ansible_host=WORKER2_PUBLIC_IP

[k8s_cluster:children]
master
workers

[k8s_cluster:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
